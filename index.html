<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="隨身助理">
<title>隨身助理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14; --surface: #17171f; --surface2: #1e1e2a;
    --border: #2a2a3a; --accent: #c8a96e; --accent2: #7ec8b0;
    --accent3: #e87c6b; --text: #e8e4dc; --text2: #8a8699; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 10% 20%, rgba(200,169,110,0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 90% 80%, rgba(126,200,176,0.05) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(15,15,20,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
  .app-date { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--text2); }
  .notif-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text2); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: 'Noto Serif TC', serif; }
  .notif-btn.on { border-color: var(--accent2); color: var(--accent2); }
  main { flex: 1; position: relative; z-index: 1; padding: 20px; max-width: 480px; margin: 0 auto; width: 100%; }

  /* AI Section */
  .ai-section { background: linear-gradient(135deg, rgba(200,169,110,0.08), rgba(126,200,176,0.05)); border: 1px solid rgba(200,169,110,0.3); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .ai-label { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .ai-sublabel { font-size: 0.65rem; color: var(--text2); margin-bottom: 12px; font-family: 'Space Mono', monospace; line-height: 1.5; }
  .ai-input-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
  .ai-textarea { flex: 1; background: var(--surface2); border: 1px solid rgba(200,169,110,0.2); border-radius: 10px; color: var(--text); font-family: 'Noto Serif TC', serif; font-size: 0.9rem; padding: 10px 14px; resize: none; min-height: 60px; outline: none; transition: border-color 0.2s; }
  .ai-textarea:focus { border-color: var(--accent); }
  .ai-textarea::placeholder { color: var(--text2); }
  .mic-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .mic-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .mic-btn.recording { border-color: var(--accent3); color: var(--accent3); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,124,107,0.4); } 50% { box-shadow: 0 0 0 8px rgba(232,124,107,0); } }
  .voice-status { font-size: 0.75rem; color: var(--accent3); min-height: 18px; margin-bottom: 8px; font-family: 'Space Mono', monospace; }
  .ai-parse-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; padding: 10px; font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .ai-parse-btn:hover { opacity: 0.85; }
  .ai-parse-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* AI Preview */
  .ai-preview { display: none; background: var(--surface2); border: 1px solid var(--accent2); border-radius: 12px; padding: 14px; margin-top: 12px; }
  .ai-preview.visible { display: block; animation: slideIn 0.3s ease; }
  .ai-preview-title { font-size: 0.65rem; color: var(--accent2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .ai-preview-field { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
  .ai-preview-key { font-size: 0.7rem; color: var(--text2); white-space: nowrap; min-width: 48px; font-family: 'Space Mono', monospace; }
  .ai-preview-val { font-size: 0.85rem; color: var(--text); flex: 1; }
  .ai-preview-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-confirm { flex: 1; background: var(--accent2); color: var(--bg); border: none; border-radius: 8px; padding: 8px; font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
  .btn-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text2); font-family: 'Noto Serif TC', serif; font-size: 0.85rem; cursor: pointer; }

  /* Manual Section */
  .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 24px; }
  .input-label { font-size: 0.7rem; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  .text-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Noto Serif TC', serif; font-size: 0.9rem; padding: 10px 14px; resize: none; min-height: 60px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); }
  .field-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .field-row label { font-size: 0.75rem; color: var(--text2); white-space: nowrap; min-width: 36px; }
  input[type="date"], input[type="time"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Serif TC', serif; font-size: 0.85rem; padding: 8px 10px; outline: none; cursor: pointer; }
  input[type="date"]:focus, input[type="time"]:focus { border-color: var(--accent); }
  .reminder-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .toggle-label { font-size: 0.75rem; color: var(--text2); }
  .toggle-switch { position: relative; width: 38px; height: 22px; cursor: pointer; }
  .toggle-switch input { display: none; }
  .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; transition: background 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: var(--accent2); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(16px); }
  .time-fields { display: none; gap: 8px; align-items: center; margin-bottom: 10px; }
  .time-fields.visible { display: flex; }
  .time-fields label { font-size: 0.75rem; color: var(--text2); white-space: nowrap; }
  .add-btn { width: 100%; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: 'Noto Serif TC', serif; font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 0.8; }

  /* Calendar */
  .section-title { font-size: 0.7rem; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; color: var(--text2); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 20px; }
  .cal-day-label { text-align: center; font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text2); padding: 4px 0 8px; }
  .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 0.8rem; position: relative; transition: all 0.15s; border: 1px solid transparent; }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.other-month { opacity: 0.25; }
  .cal-cell.today { border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .cal-cell.selected { background: var(--accent); color: var(--bg); font-weight: 700; }
  .cal-cell.has-task::after { content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); }
  .cal-cell.selected.has-task::after { background: var(--bg); }
  .cal-cell.overdue::after { background: var(--accent3); }

  /* Task List */
  .task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
  .task-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .task-item.urgent { border-color: rgba(232,124,107,0.4); }
  .task-item.done { opacity: 0.45; }
  .task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 2px; color: transparent; font-size: 0.7rem; }
  .task-check:hover { border-color: var(--accent2); }
  .task-item.done .task-check { background: var(--accent2); border-color: var(--accent2); color: var(--bg); }
  .task-content { flex: 1; min-width: 0; }
  .task-text { font-size: 0.9rem; line-height: 1.4; margin-bottom: 4px; word-break: break-word; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text2); }
  .task-meta { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text2); }
  .task-meta.urgent-label { color: var(--accent3); }
  .task-reminder-badge { display: inline-block; margin-top: 4px; background: rgba(126,200,176,0.12); border: 1px solid rgba(126,200,176,0.3); border-radius: 4px; padding: 2px 6px; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent2); }
  .task-ai-badge { display: inline-block; margin-top: 4px; margin-left: 4px; background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.25); border-radius: 4px; padding: 2px 6px; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent); }
  .task-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 1rem; padding: 0; transition: color 0.2s; line-height: 1; flex-shrink: 0; }
  .task-delete:hover { color: var(--accent3); }
  .empty-msg { text-align: center; color: var(--text2); font-size: 0.85rem; padding: 24px 0; font-family: 'Space Mono', monospace; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 0.8rem; color: var(--text); z-index: 999; transition: transform 0.3s ease; white-space: nowrap; font-family: 'Space Mono', monospace; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(15,15,20,0.3); border-top-color: var(--bg); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div>
    <div class="app-title">隨身助理</div>
    <div class="app-date" id="headerDate"></div>
  </div>
  <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔔 開啟通知</button>
</header>
<main>
  <!-- AI Section -->
  <div class="ai-section">
    <div class="ai-label">✦ AI 智慧新增</div>
    <div class="ai-sublabel">口述或輸入自然語言，AI 自動解析事項、截止日與提醒時間<br>內容將傳送至 Anthropic 伺服器處理，不會被儲存</div>
    <div class="ai-input-row">
      <textarea class="ai-textarea" id="aiInput" placeholder='例：「下週五要交報告，提前兩天早上九點提醒我」' rows="2"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="語音輸入">🎤</button>
    </div>
    <div class="voice-status" id="voiceStatus"></div>
    <button class="ai-parse-btn" id="aiParseBtn" onclick="parseWithAI()">✦ AI 解析並新增</button>
    <div class="ai-preview" id="aiPreview">
      <div class="ai-preview-title">✦ AI 解析結果 — 請確認</div>
      <div class="ai-preview-field"><span class="ai-preview-key">事項</span><span class="ai-preview-val" id="previewText">—</span></div>
      <div class="ai-preview-field"><span class="ai-preview-key">截止日</span><span class="ai-preview-val" id="previewDate">—</span></div>
      <div class="ai-preview-field"><span class="ai-preview-key">提醒</span><span class="ai-preview-val" id="previewReminder">—</span></div>
      <div class="ai-preview-actions">
        <button class="btn-confirm" onclick="confirmAITask()">✓ 確認新增</button>
        <button class="btn-cancel" onclick="cancelAIPreview()">取消</button>
      </div>
    </div>
  </div>

  <!-- Manual Section -->
  <div class="input-section">
    <div class="input-label">手動新增</div>
    <div class="text-row"><textarea id="taskInput" placeholder="輸入待辦事項…" rows="2"></textarea></div>
    <div class="field-row"><label>截止日</label><input type="date" id="dateInput"></div>
    <div class="reminder-toggle">
      <label class="toggle-switch">
        <input type="checkbox" id="reminderToggle" onchange="toggleReminderFields()">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
      <span class="toggle-label">設定提醒時間</span>
    </div>
    <div class="time-fields" id="timeFields">
      <label>提醒於</label>
      <input type="date" id="reminderDate">
      <input type="time" id="reminderTime" value="09:00">
    </div>
    <button class="add-btn" onclick="addTask()">新增待辦</button>
  </div>

  <div class="section-title">月曆</div>
  <div class="cal-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="calMonth"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="section-title" id="taskListTitle">所有待辦</div>
  <div class="task-list" id="taskList"></div>
</main>
<div class="toast" id="toast"></div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let currentDate = new Date();
let selectedDate = null;
let recognition = null;
let isRecording = false;
let pendingAITask = null;

function init() {
  updateHeaderDate();
  setDefaultDates();
  renderCalendar();
  renderTasks();
  updateNotifBtn();
  startReminderLoop();
}

function updateHeaderDate() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent = `${now.getFullYear()}．${now.getMonth()+1}．${now.getDate()}　星期${days[now.getDay()]}`;
}

function setDefaultDates() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('dateInput').value = formatDate(tomorrow);
  document.getElementById('reminderDate').value = formatDate(tomorrow);
}

// ── AI Parse ──────────────────────────────────────────
async function parseWithAI() {
  const text = document.getElementById('aiInput').value.trim();
  if (!text) { showToast('請先輸入或口述內容'); return; }
  const btn = document.getElementById('aiParseBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> AI 解析中…';
  const today = new Date();
  const prompt = `今天是 ${formatDate(today)}（星期${['日','一','二','三','四','五','六'][today.getDay()]}）。
使用者說：「${text}」
請萃取待辦事項，以 JSON 回傳（只回傳 JSON，不含其他文字）：
{"task":"事項名稱","deadline":"YYYY-MM-DD或null","reminder_date":"YYYY-MM-DD或null","reminder_time":"HH:MM"}
注意：「下週五」=下週五、「後天」=今天+2、「提前N天」=deadline-N天、無提醒時間預設"09:00"`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 200, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const raw = data.content.find(b => b.type === 'text')?.text || '';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    pendingAITask = parsed;
    showAIPreview(parsed);
  } catch(e) {
    showToast('AI 解析失敗，請手動輸入');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ AI 解析並新增';
  }
}

function showAIPreview(p) {
  document.getElementById('previewText').textContent = p.task || '（未識別）';
  document.getElementById('previewDate').textContent = p.deadline || '（未設定）';
  document.getElementById('previewReminder').textContent = p.reminder_date ? `${p.reminder_date} ${p.reminder_time}` : '（無提醒）';
  document.getElementById('aiPreview').classList.add('visible');
}

function confirmAITask() {
  if (!pendingAITask) return;
  const p = pendingAITask;
  tasks.unshift({
    id: Date.now(), text: p.task || document.getElementById('aiInput').value.trim(),
    date: p.deadline || formatDate(new Date()), done: false, created: new Date().toISOString(), aiGenerated: true,
    reminder: p.reminder_date ? { date: p.reminder_date, time: p.reminder_time || '09:00', sent: false } : null
  });
  saveTasks();
  document.getElementById('aiInput').value = '';
  cancelAIPreview();
  renderCalendar(); renderTasks();
  showToast('✓ AI 已新增待辦事項');
}

function cancelAIPreview() {
  document.getElementById('aiPreview').classList.remove('visible');
  pendingAITask = null;
}

// ── Voice ──────────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { showToast('此瀏覽器不支援語音辨識'); return; }
  if (isRecording) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-TW'; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); document.getElementById('voiceStatus').textContent = '🔴 聆聽中…'; };
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('aiInput').value = t;
    if (e.results[e.results.length-1].isFinal) document.getElementById('voiceStatus').textContent = '✓ 完成，點「AI 解析並新增」';
  };
  recognition.onerror = (e) => { showToast('語音辨識失敗：'+e.error); stopRecording(); };
  recognition.onend = () => stopRecording();
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  setTimeout(() => { document.getElementById('voiceStatus').textContent = ''; }, 3000);
}

// ── Manual ─────────────────────────────────────────────
function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  const date = document.getElementById('dateInput').value;
  const hasReminder = document.getElementById('reminderToggle').checked;
  if (!text) { showToast('請輸入待辦事項內容'); return; }
  if (!date) { showToast('請選擇截止日期'); return; }
  tasks.unshift({ id: Date.now(), text, date, done: false, created: new Date().toISOString(),
    reminder: hasReminder ? { date: document.getElementById('reminderDate').value, time: document.getElementById('reminderTime').value, sent: false } : null });
  saveTasks();
  document.getElementById('taskInput').value = '';
  setDefaultDates();
  document.getElementById('reminderToggle').checked = false;
  toggleReminderFields();
  renderCalendar(); renderTasks();
  showToast('✓ 已新增待辦事項');
}

function toggleReminderFields() {
  const on = document.getElementById('reminderToggle').checked;
  document.getElementById('timeFields').className = 'time-fields'+(on?' visible':'');
  if (on && Notification.permission !== 'granted') Notification.requestPermission().then(updateNotifBtn);
}

// ── Reminders ─────────────────────────────────────────
function startReminderLoop() { checkReminders(); setInterval(checkReminders, 60000); }
function checkReminders() {
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  const todayStr = formatDate(now);
  const currentTime = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  let changed = false;
  tasks.forEach(task => {
    if (task.done || !task.reminder || task.reminder.sent) return;
    const { date: rDate, time: rTime } = task.reminder;
    if (rDate === todayStr && rTime <= currentTime) {
      const daysLeft = Math.ceil((new Date(task.date)-now)/86400000);
      const msg = daysLeft > 0 ? `「${task.text}」還有 ${daysLeft} 天到期（${task.date}）` : daysLeft === 0 ? `「${task.text}」今天到期！` : `「${task.text}」已逾期（${task.date}）`;
      new Notification('⏰ 隨身助理提醒', { body: msg });
      task.reminder.sent = true; changed = true;
    }
    if (rDate < todayStr) { task.reminder.sent = true; changed = true; }
  });
  if (changed) saveTasks();
}

function toggleNotifications() {
  if (Notification.permission === 'granted') { showToast('通知已開啟，如需關閉請至系統設定'); return; }
  Notification.requestPermission().then(p => { updateNotifBtn(); showToast(p==='granted'?'✓ 通知已開啟！':'未取得通知權限'); });
}
function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (Notification.permission === 'granted') { btn.textContent = '🔔 通知已開啟'; btn.classList.add('on'); }
  else { btn.textContent = '🔕 開啟通知'; btn.classList.remove('on'); }
}

// ── Calendar ───────────────────────────────────────────
function renderCalendar() {
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const names = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calMonth').textContent = `${year} · ${names[month]}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = ['日','一','二','三','四','五','六'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const daysInPrev = new Date(year,month,0).getDate();
  const today = new Date();
  const taskDates = new Set(tasks.filter(t=>!t.done).map(t=>t.date));
  const overdueDates = new Set(tasks.filter(t=>!t.done&&t.date<formatDate(today)).map(t=>t.date));
  for (let i=firstDay-1;i>=0;i--) grid.appendChild(makeCell(daysInPrev-i,formatDate(new Date(year,month-1,daysInPrev-i)),true,today,taskDates,overdueDates));
  for (let d=1;d<=daysInMonth;d++) grid.appendChild(makeCell(d,formatDate(new Date(year,month,d)),false,today,taskDates,overdueDates));
  const rem = (firstDay+daysInMonth)%7===0?0:7-(firstDay+daysInMonth)%7;
  for (let d=1;d<=rem;d++) grid.appendChild(makeCell(d,formatDate(new Date(year,month+1,d)),true,today,taskDates,overdueDates));
}
function makeCell(day,dateStr,otherMonth,today,taskDates,overdueDates) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  if (otherMonth) cell.classList.add('other-month');
  if (dateStr===formatDate(today)) cell.classList.add('today');
  if (selectedDate===dateStr) cell.classList.add('selected');
  if (taskDates.has(dateStr)) cell.classList.add('has-task');
  if (overdueDates.has(dateStr)) cell.classList.add('overdue');
  cell.textContent = day;
  cell.onclick = ()=>selectDate(dateStr);
  return cell;
}
function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth()+dir); renderCalendar(); }
function selectDate(dateStr) {
  selectedDate = selectedDate===dateStr?null:dateStr;
  if (selectedDate) document.getElementById('dateInput').value = selectedDate;
  renderCalendar(); renderTasks();
}

// ── Tasks ──────────────────────────────────────────────
function renderTasks() {
  const list = document.getElementById('taskList');
  const title = document.getElementById('taskListTitle');
  const today = formatDate(new Date());
  const twoDays = formatDate(new Date(Date.now()+2*86400000));
  let filtered = selectedDate?tasks.filter(t=>t.date===selectedDate):tasks;
  title.textContent = selectedDate?`${selectedDate} 的待辦`:'所有待辦';
  if (!filtered.length) { list.innerHTML=`<div class="empty-msg">${selectedDate?'這天沒有待辦事項':'尚無待辦事項'}</div>`; return; }
  list.innerHTML = filtered.map(task=>{
    const isOverdue = !task.done&&task.date<today;
    const isUrgent = !task.done&&task.date<=twoDays&&task.date>=today;
    let metaText=`截止：${task.date}`,metaClass='';
    if (isOverdue){metaText=`⚠ 已逾期 ${task.date}`;metaClass='urgent-label';}
    else if (isUrgent){metaText=`⏰ 即將到期 ${task.date}`;metaClass='urgent-label';}
    const reminderBadge = task.reminder?`<div class="task-reminder-badge">🔔 ${task.reminder.date} ${task.reminder.time}${task.reminder.sent?' ✓':''}</div>`:'';
    const aiBadge = task.aiGenerated?`<div class="task-ai-badge">✦ AI</div>`:'';
    return `<div class="task-item ${task.done?'done':''} ${(isUrgent||isOverdue)?'urgent':''}">
      <button class="task-check" onclick="toggleTask(${task.id})">${task.done?'✓':''}</button>
      <div class="task-content">
        <div class="task-text">${escHtml(task.text)}</div>
        <div class="task-meta ${metaClass}">${metaText}</div>
        ${reminderBadge}${aiBadge}
      </div>
      <button class="task-delete" onclick="deleteTask(${task.id})">✕</button>
    </div>`;
  }).join('');
}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;saveTasks();renderTasks();}}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveTasks();renderCalendar();renderTasks();}
function saveTasks(){localStorage.setItem('tasks',JSON.stringify(tasks));}
function formatDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
