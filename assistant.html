<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="隨身助理">
<title>隨身助理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #17171f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent2: #7ec8b0;
    --accent3: #e87c6b;
    --text: #e8e4dc;
    --text2: #8a8699;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(200,169,110,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 80%, rgba(126,200,176,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,20,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .app-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text2);
  }

  /* Notification toggle */
  .notif-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text2);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Serif TC', serif;
  }
  .notif-btn.on { border-color: var(--accent2); color: var(--accent2); }
  .notif-btn:hover { opacity: 0.8; }

  /* Main layout */
  main {
    flex: 1;
    position: relative;
    z-index: 1;
    padding: 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* Input section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 24px;
  }

  .input-label {
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .text-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 10px;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    resize: none;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); }

  .mic-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .mic-btn.recording {
    border-color: var(--accent3);
    color: var(--accent3);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,124,107,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(232,124,107,0); }
  }

  /* Date picker row */
  .date-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .date-row label {
    font-size: 0.75rem;
    color: var(--text2);
    white-space: nowrap;
  }

  input[type="date"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  input[type="date"]:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }

  /* Voice status */
  .voice-status {
    font-size: 0.75rem;
    color: var(--accent3);
    margin-top: 8px;
    min-height: 18px;
    font-family: 'Space Mono', monospace;
  }

  /* Calendar section */
  .section-title {
    font-size: 0.7rem;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Calendar nav */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-month {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    color: var(--text2);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 20px;
  }

  .cal-day-label {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
    padding: 4px 0 8px;
    letter-spacing: 0.05em;
  }

  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    position: relative;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .cal-cell:hover { background: var(--surface2); }

  .cal-cell.other-month { opacity: 0.25; }

  .cal-cell.today {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }

  .cal-cell.selected {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .cal-cell.has-task::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .cal-cell.selected.has-task::after { background: var(--bg); }

  .cal-cell.overdue::after { background: var(--accent3); }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item.urgent { border-color: rgba(232,124,107,0.4); }
  .task-item.done { opacity: 0.45; }

  .task-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 2px;
    color: transparent;
    font-size: 0.7rem;
  }
  .task-check:hover { border-color: var(--accent2); }
  .task-item.done .task-check {
    background: var(--accent2);
    border-color: var(--accent2);
    color: var(--bg);
  }

  .task-content { flex: 1; min-width: 0; }

  .task-text {
    font-size: 0.9rem;
    line-height: 1.4;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .task-item.done .task-text { text-decoration: line-through; color: var(--text2); }

  .task-meta {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
  }

  .task-meta.urgent-label { color: var(--accent3); }

  .task-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    transition: color 0.2s;
    line-height: 1;
    flex-shrink: 0;
  }
  .task-delete:hover { color: var(--accent3); }

  .empty-msg {
    text-align: center;
    color: var(--text2);
    font-size: 0.85rem;
    padding: 24px 0;
    font-family: 'Space Mono', monospace;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 0.8rem;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    font-family: 'Space Mono', monospace;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <div class="app-title">隨身助理</div>
    <div class="app-date" id="headerDate"></div>
  </div>
  <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔔 開啟通知</button>
</header>

<main>
  <!-- Input Section -->
  <div class="input-section">
    <div class="input-label">＋ 新增待辦事項</div>
    <div class="text-row">
      <textarea id="taskInput" placeholder="輸入或口述待辦事項…" rows="2"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="語音輸入">🎤</button>
    </div>
    <div class="date-row">
      <label for="dateInput">截止日</label>
      <input type="date" id="dateInput">
      <button class="add-btn" onclick="addTask()">新增</button>
    </div>
    <div class="voice-status" id="voiceStatus"></div>
  </div>

  <!-- Calendar -->
  <div class="section-title">月曆</div>
  <div class="cal-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="calMonth"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <!-- Task List -->
  <div class="section-title" id="taskListTitle">所有待辦</div>
  <div class="task-list" id="taskList"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let currentDate = new Date();
let selectedDate = null;
let recognition = null;
let isRecording = false;
let notifGranted = Notification.permission === 'granted';

// ── Init ───────────────────────────────────────────────
function init() {
  updateHeaderDate();
  setDefaultDate();
  renderCalendar();
  renderTasks();
  updateNotifBtn();
  scheduleReminders();

  // Set up daily reminder check
  setInterval(scheduleReminders, 60 * 60 * 1000);
}

function updateHeaderDate() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}．${now.getMonth()+1}．${now.getDate()}　星期${days[now.getDay()]}`;
}

function setDefaultDate() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('dateInput').value = formatDate(tomorrow);
}

// ── Tasks ──────────────────────────────────────────────
function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  const date = document.getElementById('dateInput').value;
  if (!text) { showToast('請輸入待辦事項內容'); return; }
  if (!date) { showToast('請選擇截止日期'); return; }

  const task = {
    id: Date.now(),
    text,
    date,
    done: false,
    created: new Date().toISOString()
  };

  tasks.unshift(task);
  saveTasks();
  document.getElementById('taskInput').value = '';
  setDefaultDate();
  renderCalendar();
  renderTasks();
  scheduleReminders();
  showToast('✓ 已新增待辦事項');
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderCalendar();
  renderTasks();
}

function saveTasks() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

// ── Calendar ───────────────────────────────────────────
function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calMonth').textContent = `${year} · ${monthNames[month]}`;

  const grid = document.getElementById('calGrid');
  const dayLabels = ['日','一','二','三','四','五','六'];
  grid.innerHTML = dayLabels.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const today = new Date();

  const taskDates = new Set(tasks.filter(t => !t.done).map(t => t.date));
  const overdueDates = new Set(tasks.filter(t => !t.done && t.date < formatDate(today)).map(t => t.date));

  // Prev month cells
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const dateStr = formatDate(new Date(year, month - 1, d));
    grid.appendChild(makeCell(d, dateStr, true, today, taskDates, overdueDates));
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = formatDate(new Date(year, month, d));
    grid.appendChild(makeCell(d, dateStr, false, today, taskDates, overdueDates));
  }

  // Next month
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const dateStr = formatDate(new Date(year, month + 1, d));
    grid.appendChild(makeCell(d, dateStr, true, today, taskDates, overdueDates));
  }
}

function makeCell(day, dateStr, otherMonth, today, taskDates, overdueDates) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  if (otherMonth) cell.classList.add('other-month');
  if (dateStr === formatDate(today)) cell.classList.add('today');
  if (selectedDate === dateStr) cell.classList.add('selected');
  if (taskDates.has(dateStr)) cell.classList.add('has-task');
  if (overdueDates.has(dateStr)) cell.classList.add('overdue');
  cell.textContent = day;
  cell.onclick = () => selectDate(dateStr);
  return cell;
}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  renderCalendar();
}

function selectDate(dateStr) {
  if (selectedDate === dateStr) {
    selectedDate = null;
  } else {
    selectedDate = dateStr;
    document.getElementById('dateInput').value = dateStr;
  }
  renderCalendar();
  renderTasks();
}

// ── Task List Render ───────────────────────────────────
function renderTasks() {
  const list = document.getElementById('taskList');
  const title = document.getElementById('taskListTitle');
  const today = formatDate(new Date());
  const twoDaysBefore = formatDate(new Date(Date.now() + 2 * 86400000));

  let filtered = selectedDate
    ? tasks.filter(t => t.date === selectedDate)
    : tasks;

  title.textContent = selectedDate ? `${selectedDate} 的待辦` : '所有待辦';

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-msg">${selectedDate ? '這天沒有待辦事項' : '尚無待辦事項'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(task => {
    const isOverdue = !task.done && task.date < today;
    const isUrgent = !task.done && task.date <= twoDaysBefore && task.date >= today;
    let metaText = `截止：${task.date}`;
    let metaClass = '';

    if (isOverdue) { metaText = `⚠ 已逾期 ${task.date}`; metaClass = 'urgent-label'; }
    else if (isUrgent) { metaText = `⏰ 即將到期 ${task.date}`; metaClass = 'urgent-label'; }

    return `
      <div class="task-item ${task.done ? 'done' : ''} ${(isUrgent || isOverdue) ? 'urgent' : ''}">
        <button class="task-check" onclick="toggleTask(${task.id})">${task.done ? '✓' : ''}</button>
        <div class="task-content">
          <div class="task-text">${escHtml(task.text)}</div>
          <div class="task-meta ${metaClass}">${metaText}</div>
        </div>
        <button class="task-delete" onclick="deleteTask(${task.id})">✕</button>
      </div>
    `;
  }).join('');
}

// ── Voice Input ────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('此瀏覽器不支援語音辨識');
    return;
  }

  if (isRecording) {
    recognition && recognition.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('voiceStatus').textContent = '🔴 聆聽中…';
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('taskInput').value = transcript;
    if (e.results[e.results.length - 1].isFinal) {
      document.getElementById('voiceStatus').textContent = '✓ 語音辨識完成';
    }
  };

  recognition.onerror = (e) => {
    showToast('語音辨識失敗：' + e.error);
    stopRecording();
  };

  recognition.onend = () => stopRecording();
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  setTimeout(() => { document.getElementById('voiceStatus').textContent = ''; }, 2000);
}

// ── Notifications ──────────────────────────────────────
function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔 通知已開啟';
    btn.classList.add('on');
  } else {
    btn.textContent = '🔕 開啟通知';
    btn.classList.remove('on');
  }
}

function toggleNotifications() {
  if (Notification.permission === 'granted') {
    showToast('通知已開啟，系統不支援關閉（請從瀏覽器設定）');
    return;
  }
  Notification.requestPermission().then(p => {
    updateNotifBtn();
    if (p === 'granted') {
      showToast('✓ 通知已開啟！');
      scheduleReminders();
    } else {
      showToast('未取得通知權限');
    }
  });
}

function scheduleReminders() {
  if (Notification.permission !== 'granted') return;

  const today = formatDate(new Date());
  const twoDaysLater = formatDate(new Date(Date.now() + 2 * 86400000));

  tasks.forEach(task => {
    if (task.done) return;
    if (task.date === twoDaysLater) {
      // Show notification for tasks due in 2 days
      const key = `notif_${task.id}_${task.date}`;
      if (!localStorage.getItem(key)) {
        new Notification('隨身助理 提醒', {
          body: `「${task.text}」將於 ${task.date} 到期（還有 2 天）`,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%230f0f14"/><text y="44" x="10" font-size="40">📋</text></svg>'
        });
        localStorage.setItem(key, '1');
      }
    }
    if (task.date < today && !task.done) {
      const key = `notif_overdue_${task.id}`;
      if (!localStorage.getItem(key)) {
        new Notification('隨身助理 逾期提醒', {
          body: `「${task.text}」已於 ${task.date} 逾期！`,
        });
        localStorage.setItem(key, '1');
      }
    }
  });
}

// ── Utils ──────────────────────────────────────────────
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Enter key to add
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(); }
});

init();
</script>
